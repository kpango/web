name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: kpango/web

jobs:
  docker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test (Docker)
        run: make docker-build

      - name: Smoke test (start server and curl)
        run: |
          make docker-run &
          # Wait for the server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8787/ > /dev/null 2>&1; then
              echo "Server is up"
              break
            fi
            sleep 1
          done
          # Verify key pages return 200
          curl -sf -o /dev/null -w '%{http_code}' http://localhost:8787/    | grep -q 200
          curl -sf -o /dev/null -w '%{http_code}' http://localhost:8787/cv  | grep -q 200
          curl -sf -o /dev/null -w '%{http_code}' http://localhost:8787/oss | grep -q 200
          echo "All smoke tests passed"
          docker stop kpango-web || true

  docker-push:
    needs: docker-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
